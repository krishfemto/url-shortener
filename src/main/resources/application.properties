# ===== Server =====
server.port=8080

# ===== H2 Database (in-memory, no installation needed) =====
spring.datasource.url=jdbc:h2:mem:urlshortener
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate - auto-creates tables from @Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console - visit http://localhost:8080/h2-console to inspect the database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== App-specific =====
app.base-url=http://localhost:8080
app.default-expiry-days=30
