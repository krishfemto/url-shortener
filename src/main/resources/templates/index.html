<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: -apple-system, "Segoe UI", Arial, sans-serif;
            background: #0f1115;
            color: #e6e6e6;
            max-width: 640px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { font-size: 24px; font-weight: 500; margin-bottom: 4px; }
        .subtitle { color: #9a9a9a; font-size: 13px; margin-bottom: 28px; }

        form {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        input[type="text"] {
            flex: 1;
            background: #1a1d24;
            border: 1px solid #2a2d35;
            color: #e6e6e6;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 14px;
        }
        input[type="text"]:focus { outline: none; border-color: #4a90e2; }
        button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover { background: #3a7bc8; }

        .error { color: #f87171; font-size: 13px; margin-bottom: 16px; }

        .result {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 16px 20px;
            margin: 16px 0 24px;
        }
        .result-label { font-size: 12px; color: #9a9a9a; margin-bottom: 4px; }
        .result-link { font-size: 16px; font-weight: 500; color: #4ade80; }
        .result-link a { color: #4ade80; text-decoration: none; }
        .result-link a:hover { text-decoration: underline; }
        .result-original {
            font-size: 12px;
            color: #6a6a6a;
            margin-top: 8px;
            word-break: break-all;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 24px; font-size: 13px; }
        th { text-align: left; color: #9a9a9a; font-weight: 500; padding: 8px 12px; border-bottom: 1px solid #2a2d35; }
        td { padding: 10px 12px; border-bottom: 1px solid #1a1d24; }
        td a { color: #4a90e2; text-decoration: none; }
        td a:hover { text-decoration: underline; }
        .original-url {
            color: #8a8a8a;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
        }
        .click-count {
            background: rgba(74, 144, 226, 0.15);
            color: #4a90e2;
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .empty { color: #6a6a6a; font-size: 13px; padding: 16px 0; }
        .h2-link { margin-top: 32px; font-size: 12px; }
        .h2-link a { color: #6a6a6a; }
    </style>
</head>
<body>

<h1>URL Shortener</h1>
<p class="subtitle">Paste a long URL below to get a short link</p>

<form action="/shorten" method="post" th:object="${shortenForm}">
    <input type="text" th:field="*{originalUrl}" placeholder="https://example.com/very/long/path">
    <button type="submit">Shorten</button>
</form>
<p class="error" th:if="${#fields.hasErrors('shortenForm.originalUrl')}"
   th:errors="*{shortenForm.originalUrl}">Error</p>

<div class="result" th:if="${result != null}">
    <div class="result-label">Your short link:</div>
    <div class="result-link"><a th:href="${shortUrl}" th:text="${shortUrl}" target="_blank"></a></div>
    <div class="result-original" th:text="${result.originalUrl}"></div>
</div>

<table th:if="${not #lists.isEmpty(recentLinks)}">
    <tr>
        <th>Short link</th>
        <th>Original URL</th>
        <th>Clicks</th>
    </tr>
    <tr th:each="link : ${recentLinks}">
        <td><a th:href="'/' + ${link.shortCode}" th:text="${link.shortCode}" target="_blank"></a></td>
        <td><span class="original-url" th:text="${link.originalUrl}"></span></td>
        <td><span class="click-count" th:text="${link.clickCount}"></span></td>
    </tr>
</table>

<p class="empty" th:if="${#lists.isEmpty(recentLinks)}">No links yet — create one above.</p>

<p class="h2-link"><a href="/h2-console" target="_blank">View database (H2 console)</a></p>

</body>
</html>
